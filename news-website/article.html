<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - NewsHub</title>
    
    <meta name="description" content="Read the latest breaking news and in-depth articles on NewsHub.">
    
    <meta property="og:title" content="Article - NewsHub">
    <meta property="og:description" content="Read the latest breaking news and in-depth articles on NewsHub.">
    <meta property="og:type" content="article">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Article - NewsHub">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/article.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="container main-content">
        <div class="left-column">
            <div class="loader" id="loader"></div>
            <div class="error-message" id="error-message"></div>

            <article class="article-detail" id="article-detail">
            </article>
        </div>

        <div class="right-column">
            <section class="sidebar-section" id="poll-widget-section" style="display: none;">
                <h3 class="sidebar-title">POLL OF THE WEEK</h3>
                <div id="poll-container" class="poll-container">
                </div>
            </section>

            <section class="sidebar-section">
                <div id="sidebar-sticky-ad" class="ad-slot" style="position: sticky; top: 20px; display: none;"></div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/homepage.js"></script>
    <script src="js/loadComponents.js"></script>
    <script src="js/index-ui.js"></script>
    <script src="js/article.js"></script>
    <script src="js/comments.js"></script>
    <script src="js/related.js"></script>
    <script src="js/poll.js"></script>


</body>

</html>
