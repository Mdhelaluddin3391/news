<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - NewsHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/edit-profile.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="auth-container edit-profile-box">
            <h1 class="auth-title">Edit Profile</h1>
            <div class="auth-success" id="edit-success"></div>
            <div class="auth-error" id="edit-error"></div>
            
            <form class="auth-form" id="edit-profile-form">
                <div class="form-group">
                    <label for="edit-name">Full Name</label>
                    <input type="text" id="edit-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-email">Email Address (Cannot be changed)</label>
                    <input type="email" id="edit-email" disabled style="background-color: #f1f5f9;">
                </div>
                <hr style="border:0; border-top:1px solid var(--border); margin: 10px 0;">
                <p style="font-size:0.9rem; color:var(--gray);">Leave password fields blank if you don't want to change it.</p>
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-new-password">Confirm New Password</label>
                    <input type="password" id="confirm-new-password">
                </div>
                <button type="submit" class="auth-btn">Save Changes</button>
            </form>
            <p class="auth-link"><a href="profile.html">Cancel & Go Back</a></p>
        </div>
    </main>
<div id="footer-placeholder"></div>


<script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/homepage.js"></script> 
    <script src="js/index-ui.js"></script>
    <script src="js/loadComponents.js"></script>
    <script src="js/edit-profile.js"></script>
</body>
</html>
