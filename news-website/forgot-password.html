<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - NewsHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/search.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="auth-container">
            <h1 class="auth-title">Reset Your Password</h1>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            <div class="auth-error" id="forgot-error"></div>
            <div class="auth-success" id="forgot-success" style="display:none; background:#d4edda; color:#155724; padding:0.8rem; border-radius:8px; margin-bottom:1rem;"></div>
            <form class="auth-form" id="forgot-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit" class="auth-btn">Send Reset Link</button>
            </form>
            <p class="auth-link"><a href="login.html">Back to Login</a></p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/homepage.js"></script> 
    <script src="js/index-ui.js"></script>
    <script src="js/loadComponents.js"></script>
    <script src="js/forgot-password.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
