<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsHub - Premium News</title>
    
    <meta name="description" content="Stay updated with the latest breaking news, trending stories, and in-depth articles from around the world on NewsHub.">
    
    <meta property="og:title" content="NewsHub - Premium News">
    <meta property="og:description" content="Stay updated with the latest breaking news, trending stories, and in-depth articles from around the world on NewsHub.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://images.unsplash.com/photo-1588681664899-f142ff2dc9b1?auto=format&fit=crop&w=1200&q=80">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="NewsHub - Premium News">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/search.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="breaking">
        <div class="container breaking-flex">
            <div class="breaking-label">BREAKING</div>
            <div class="ticker">
                <span id="breaking-ticker-content">Loading...</span>
            </div>
        </div>
    </div>

    <main class="container main-content">
        <div class="left-column">
            <section class="featured-news">
                <div id="featured-news-container" class="featured-news-item">
                </div>
            </section>

            <div id="home-categories-container"></div>
            <div class="loader" id="category-scroll-loader"
                style="display: none; margin: 30px auto; border-top-color: var(--secondary);"></div>


            <h1 class="category-heading" id="category-heading" style="display: none;">General News</h1>

            <div class="loader" id="loader"></div>

            <div class="articles-container" id="articles-container" style="display: none;"></div>

            <div class="pagination" id="pagination" style="display: none;">
                <button class="page-btn" id="prev-page" disabled>← Previous</button>
                <span class="page-info" id="page-info">Page 1</span>
                <button class="page-btn" id="next-page">Next →</button>
            </div>

            <div class="error-message" id="error-message"></div>
        </div>


        <div class="right-column">


            <section class="sidebar-section">
                <h3 class="sidebar-title">EDITOR'S PICKS</h3>
                <div id="editors-picks-container" class="trending-news">
                    <p style="color: var(--gray); font-size: 0.9rem;">Loading picks...</p>
                </div>
            </section>


            <section class="sidebar-section">
                <h3 class="sidebar-title">TRENDING NOW</h3>
                <div id="trending-container" class="trending-news">
                </div>
            </section>

            <section class="sidebar-section">
                <h3 class="sidebar-title">CATEGORIES</h3>
                <ul id="categories-container" class="category-list">
                </ul>
            </section>

            <section class="sidebar-section" id="poll-widget-section" style="display: none;">
                <h3 class="sidebar-title">POLL OF THE WEEK</h3>
                <div id="poll-container" class="poll-container">
                </div>
            </section>

            <section class="sidebar-section">
                <div class="ad-slot ad-sidebar" id="sidebar-ad-1" style="display: none;"></div>
            </section>

            <div id="article-top-ad" class="ad-slot ad-banner" style="display: none;"></div>


            <section class="sidebar-section">
                <div class="newsletter-form">
                    <h3>Stay Updated</h3>
                    <p>Subscribe to our newsletter for daily news updates.</p>
                    <form id="newsletterForm">
                        <input type="email" placeholder="Your email address" required>
                        <button type="submit">Subscribe Now</button>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/homepage.js"></script>
    <script src="js/index-ui.js"></script>
    <script src="js/loadComponents.js"></script>
    <script src="js/poll.js"></script>
    <script src="js/search.js"></script>
</body>

</html>
