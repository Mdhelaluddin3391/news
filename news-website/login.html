<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NewsHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="auth-container">
            <h1 class="auth-title">Login to NewsHub</h1>
            <div class="auth-error" id="login-error"></div>
            <form class="auth-form" id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                        <label for="password" style="margin-bottom: 0;">Password</label>
                        <a href="forgot-password.html"
                            style="font-size: 0.9rem; color: var(--primary); text-decoration: none;">Forgot
                            Password?</a>
                    </div>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="auth-btn">Login</button>
            </form>

            <div style="text-align: center; margin: 1.5rem 0;">
                <p style="color: var(--gray); margin-bottom: 10px; font-size: 0.9rem;">OR</p>
                
                <div id="g_id_onload"
                     data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleLogin"
                     data-auto_prompt="false">
                </div>

                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="outline"
                     data-text="continue_with"
                     data-size="large"
                     data-logo_alignment="center"
                     style="display: flex; justify-content: center;">
                </div>
            </div>
            <p class="auth-link">Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/homepage.js"></script>
    <script src="js/index-ui.js"></script>
    <script src="js/login.js"></script>
    <script src="js/loadComponents.js"></script>
</body>

</html>
