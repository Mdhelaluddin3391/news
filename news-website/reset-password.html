<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - NewsHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="auth-container">
            <h1 class="auth-title">Set New Password</h1>
            <div class="auth-error" id="reset-error"></div>
            <div class="auth-success" id="reset-success" style="display:none; background:#d4edda; color:#155724; padding:0.8rem; border-radius:8px; margin-bottom:1rem;"></div>
            <form class="auth-form" id="reset-form">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" name="new-password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm New Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
                <button type="submit" class="auth-btn">Reset Password</button>
            </form>
            <p class="auth-link"><a href="login.html">Back to Login</a></p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/homepage.js"></script> 
    <script src="js/index-ui.js"></script>
    <script src="js/reset-password.js"></script> </body>
    <script src="js/loadComponents.js"></script>
</body>
</html>
