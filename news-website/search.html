<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - NewsHub</title>
    
    <meta name="description" content="Search for the latest breaking news, trending stories, and in-depth articles on NewsHub.">
    
    <meta property="og:title" content="Search Results - NewsHub">
    <meta property="og:description" content="Search for the latest breaking news, trending stories, and in-depth articles on NewsHub.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://images.unsplash.com/photo-1588681664899-f142ff2dc9b1?auto=format&fit=crop&w=1200&q=80">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Search Results - NewsHub">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/search.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container main-content">
        <div class="left-column">
            <div class="search-header-container">
                <h1 id="search-heading">Searching for...</h1>
                <p id="results-count" class="results-meta">Finding best matches for you</p>
            </div>

            <div class="loader" id="loader"></div>
            <div class="error-message" id="error-message"></div>
            
            <div class="articles-container" id="articles-container">
                </div>
            
            <div class="pagination" id="pagination" style="display: none;">
                <button class="page-btn" id="prev-page" disabled>← Previous</button>
                <span class="page-info" id="page-info">Page 1</span>
                <button class="page-btn" id="next-page">Next →</button>
            </div>
        </div>

        <div class="right-column">
            <section class="sidebar-section">
                <h3 class="sidebar-title">EDITOR'S PICKS</h3>
                <div id="editors-picks-container" class="trending-news"></div>
            </section>

            <section class="sidebar-section">
                <h3 class="sidebar-title">TRENDING NOW</h3>
                <div id="trending-container" class="trending-news"></div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/homepage.js"></script> 
    <script src="js/loadComponents.js"></script>
    <script src="js/search.js"></script> 
</body>
</html>
